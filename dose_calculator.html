<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dose Calculator</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="style.css">
</head>

<body class="portal-body">

<h2>Dose Recommendation Calculator</h2>

<p>
This pharmacogenomic tool estimates recommended drug dosing based on
patient genotype and clinical factors.
</p>

<div class="card p-4">

<form onsubmit="calculateDose(event)">

<div class="mb-3">

<label class="form-label">Metabolizer Genotype</label>

<select id="genotype" class="form-control">

<option value="normal">Normal Metabolizer</option>
<option value="intermediate">Intermediate Metabolizer</option>
<option value="poor">Poor Metabolizer</option>

</select>

</div>


<div class="mb-3">

<label class="form-label">Patient Age</label>

<input
type="number"
id="age"
class="form-control"
placeholder="Enter patient age"
required>

</div>


<div class="mb-3">

<label class="form-label">Body Weight (kg)</label>

<input
type="number"
id="weight"
class="form-control"
placeholder="Enter body weight"
required>

</div>


<button class="btn btn-primary">
Calculate Dose
</button>

</form>

</div>


<!-- RESULT -->
<div id="resultBox" class="alert alert-info mt-4" style="display:none;">
<h4>Recommended Dose</h4>
<p id="resultText"></p>
</div>


<script>
function calculateDose(event) {
  event.preventDefault();

  let genotype = document.getElementById("genotype").value;
  let age = parseInt(document.getElementById("age").value);
  let weight = parseInt(document.getElementById("weight").value);

  let dose = "";

  if (genotype === "poor") {
    dose = "Reduce standard dose by 50%";
  } else if (genotype === "intermediate") {
    dose = "Reduce dose by 25%";
  } else {
    dose = "Use standard recommended dose";
  }

  if (age > 65) {
    dose += " (adjust further for elderly patients)";
  }

  if (weight < 50) {
    dose += " (consider lower dose due to low body weight)";
  }

  document.getElementById("resultText").innerText = dose;
  document.getElementById("resultBox").style.display = "block";
}
</script>

</body>
</html>
