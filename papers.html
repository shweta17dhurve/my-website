<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Papers</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="style.css">
</head>

<body class="portal-body">

<h1>Research Papers</h1>

<div class="table-responsive">
  <table class="table table-bordered table-striped" id="papersTable">
    <thead>
      <tr>
        <th>Title</th>
        <th>Author</th>
        <th>Year</th>
        <th>Link</th>
      </tr>
    </thead>
    <tbody>
      <!-- Data will be inserted here -->
    </tbody>
  </table>
</div>

<script>
// Example data (replace later with CSV)
const papers = [
  {
    title: "Pharmacogenomics in Cardiovascular Disease",
    author: "Smith et al.",
    year: "2020",
    link: "https://pubmed.ncbi.nlm.nih.gov/"
  },
  {
    title: "Gene–Drug Interaction Studies",
    author: "Johnson et al.",
    year: "2021",
    link: "https://pubmed.ncbi.nlm.nih.gov/"
  }
];

// Fill table
const tbody = document.querySelector("#papersTable tbody");

papers.forEach(p => {
  let row = `
    <tr>
      <td>${p.title}</td>
      <td>${p.author}</td>
      <td>${p.year}</td>
      <td><a href="${p.link}" target="_blank">View</a></td>
    </tr>
  `;
  tbody.innerHTML += row;
});
</script>

</body>
</html>
