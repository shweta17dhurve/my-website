<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pharmacogenomics Portal</title>

  <!-- ✅ Bootstrap for UI -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- ✅ Your CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<!-- ✅ Navbar -->
<nav class="navbar navbar-dark bg-primary">
  <div class="container">
    <span class="navbar-brand mb-0 h1">Pharmacogenomics Portal</span>
  </div>
</nav>

<!-- ✅ Main Container -->
<div class="container text-center mt-5">

  <h2 class="mb-4">Search Drug Information</h2>

  <!-- ✅ Search Box -->
  <form onsubmit="searchDrug(event)" class="d-flex justify-content-center">
    <input type="text" id="searchInput" class="form-control w-50 me-2" placeholder="Enter drug name">
    <button type="submit" class="btn btn-primary">Search</button>
  </form>

  <!-- ✅ Message -->
  <div id="messageBox" class="text-danger mt-3"></div>

  <!-- ✅ Navigation Links -->
  <div class="mt-4">
    <a href="drugs.html" class="btn btn-outline-primary me-2">View All Drugs</a>
    <a href="dashboard.html" class="btn btn-outline-success">Dashboard</a>
  </div>

</div>

<script src="./script.js"></script>

</body>
</html>
