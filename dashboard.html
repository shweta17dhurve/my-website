<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Database Dashboard</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="style.css">
</head>

<body class="portal-body">

<section class="portal-panel">
  <h2 class="section-title">Database Dashboard</h2>

  <div class="row g-3">
    <div class="col-md-4">
      <div class="feature-card text-center">
        <h5>Total Genes</h5>
        <div class="stat-value" id="total_genes">--</div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="feature-card text-center">
        <h5>Total Drugs</h5>
        <div class="stat-value" id="total_drugs">--</div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="feature-card text-center">
        <h5>Total Interactions</h5>
        <div class="stat-value" id="total_interactions">--</div>
      </div>
    </div>
  </div>
</section>

<script>
/* You can later replace this with real data */
document.getElementById("total_genes").innerText = 25;
document.getElementById("total_drugs").innerText = 40;
document.getElementById("total_interactions").innerText = 120;
</script>

</body>
</html>
