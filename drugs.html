<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drug Explorer</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="style.css">
</head>

<body class="portal-body">

<section class="portal-panel">
  <h2 class="section-title">Drug Explorer</h2>

  <div class="list-group" id="drugList"></div>
</section>

<script>
// Example drug list (replace later with CSV)
const drugs = ["Aspirin", "Warfarin", "Clopidogrel", "Atorvastatin"];

// Create list dynamically
const list = document.getElementById("drugList");

drugs.forEach(drug => {
  let button = document.createElement("button");
  button.className = "list-group-item list-group-item-action text-start";
  button.innerText = drug;

  // On click → go to details page
  button.onclick = () => {
    window.location.href = "drug-details.html?drug=" + drug;
  };

  list.appendChild(button);
});
</script>

</body>
</html>
