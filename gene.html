<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gene Explorer</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="style.css">
</head>

<body class="portal-body">

<section class="portal-panel">
  <h2 class="section-title">Gene Explorer</h2>

  <ul class="list-group" id="geneList"></ul>
</section>

<script>
// Example gene list (replace later with CSV)
const genes = ["CYP2C19", "CYP2C9", "VKORC1", "SLCO1B1"];

// Create list dynamically
const list = document.getElementById("geneList");

genes.forEach(gene => {
  let li = document.createElement("li");
  li.className = "list-group-item";
  li.innerText = gene;
  list.appendChild(li);
});
</script>
<script src="script.js"></script>
</body>
</html>
